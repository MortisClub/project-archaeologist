  <text x="198" y="132" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#8b949e">Понять любой проект за минуту</text>
  <rect x="198" y="146" width="300" height="3" rx="1.5" fill="#d9a441"/>
